            localName = document.getElementById('player-name-input').value.trim();

            document.getElementById('lobby-status').innerText = "雲端連線中...";
            
            roomRef = database.ref('rooms/' + roomId);
            roomRef.once('value', (snapshot) => {
                if(!snapshot.exists()) {
                    localPlayerId = 0;
                    gameState.players[0].name = localName;
                    roomRef.set({ meta: { p0_connected: true, p1_connected: false }, state: gameState });
                    setupRoomListener();
                } else {
                    let data = snapshot.val();
                    if(data.meta.p1_connected && data.state.players[1].name !== localName) {

        }

        function initBoardUI() {
            const boardEl = document.getElementById('game-board');
            const cellMatrix = Array(7).fill(null).map(() => Array(7).fill(null));
            cellConfigs.forEach((config, idx) => { const [r, c] = gridMapping[idx]; cellMatrix[r][c] = config; });
            boardEl.innerHTML = '';
            for (let r = 0; r < 7; r++) {
                for (let c = 0; c < 7; c++) {
                    const config = cellMatrix[r][c]; const cellDiv = document.createElement('div');
                    if (config) {
                        cellDiv.className = `cell ${config.color}`; cellDiv.id = `cell-${config.id}`;
                        if (config.type === "HQ") cellDiv.innerHTML = `<div>${config.name}</div>`;
                        else cellDiv.innerHTML = `<div>${config.name}</div><div class="type-icon">${config.type}</div><div class="price">$${config.price}</div>`;
                        cellDiv.innerHTML += `<div class="buildings" id="bld-${config.id}"></div><div class="tokens-container" id="tkn-${config.id}"></div>`;
                    } else cellDiv.style.background = "transparent";
                    boardEl.appendChild(cellDiv);
                }
            }
        }

        function syncStateToUI() {
            document.getElementById('win-goal-input').value = gameState.winGoal;
            for(let id=0; id<=1; id++) {
                let p = gameState.players[id];
                document.getElementById(`p${id}-name-label`).innerText = `${id+1}. ${p.name}`;
                document.getElementById(`p${id}-cash`).innerText = p.cash;
                document.getElementById(`p${id}-shops`).innerText = p.shops;
                document.getElementById(`p${id}-malls`).innerText = p.malls;

                const sHand = document.getElementById(`p${id}-sales-hand`); sHand.innerHTML = "";
                if(p.salesHand.length === 0) sHand.innerText = "無";
                else {
                    p.salesHand.forEach((card, idx) => {
                        let b = document.createElement('span'); b.className = "card-tag tag-sales"; b.innerText = `🚌走${card.steps}步`;
                        if(id === localPlayerId && gameState.currentPlayerIndex === localPlayerId) b.onclick = () => useSalesCard(idx);
                        sHand.appendChild(b);
                    });
                }

                const pHand = document.getElementById(`p${id}-plan-hand`); pHand.innerHTML = "";
                if(p.plans.length === 0) pHand.innerText = "無";
                else {
                    p.plans.forEach(card => {
                        let s = document.createElement('span'); s.className = "card-tag tag-plan"; s.innerText = card.title; s.title = card.desc;
                        pHand.appendChild(s);
                    });
                }

                const skillBox = document.getElementById(`p${id}-active-skills`); skillBox.innerHTML = "";
                if(id === localPlayerId && gameState.currentPlayerIndex === localPlayerId) {
                    p.plans.forEach(card => {
                        if(card.type === "pay_move") {
                            let btn = document.createElement('button'); btn.className = "skill-btn";
                            btn.innerText = `⚡ 發動【${card.title}】(付$${card.cost}走${card.steps}步)`;
                            btn.onclick = () => usePayMoveSkill(card);
                            skillBox.appendChild(btn);
                        }
                    });
                }
                document.getElementById(`player${id}-card`).className = `player-card p${id} ${id === gameState.currentPlayerIndex ? 'active' : ''}`;
            }

            for(let i=0; i<24; i++) {
                const tBox = document.getElementById(`tkn-${i}`); if(tBox) tBox.innerHTML = '';
                const bBox = document.getElementById(`bld-${i}`); if(bBox) bBox.innerHTML = '';
                let bState = gameState.boardState[i];
                if(bState && bState.owner !== null && bState.owner !== undefined) {
                    if (bState.level === 1) bBox.innerHTML = `<div class="building-dot shop">店鋪</div>`;
                    else if (bState.level === 2) bBox.innerHTML = `<div class="building-dot mall">商場</div>`;
                }
            }
            gameState.players.forEach(p => {
                const tBox = document.getElementById(`tkn-${p.position}`); if(tBox) tBox.innerHTML += `<div class="token p${p.id}" title="${p.name}"></div>`;
            });

            const logBox = document.getElementById('log-box'); logBox.innerHTML = gameState.logs; logBox.scrollTop = logBox.scrollHeight;
            isMyTurn = (gameState.currentPlayerIndex === localPlayerId);
            const rollBtn = document.getElementById('roll-btn');
            if (isMyTurn) { rollBtn.disabled = false; document.getElementById('action-status').innerText = `🔴 輪到你了！請採取行動`; }
            else { rollBtn.disabled = true; document.getElementById('action-status').innerText = `⏳ 等待對手行動...`; }
        }

        function uploadState() { roomRef.child('state').set(gameState); }
        function addLog(msg) { gameState.logs += msg + "<br>"; }

        function changeGoalOnCloud() {
            let val = parseInt(document.getElementById('win-goal-input').value) || 30000;
            gameState.winGoal = val; addLog(`📢 <b>【目標變更】</b> 獲勝金額調整為 <b>$${val}</b> 元！`); uploadState();
        }

        function takeTurn() {
            if(!isMyTurn) return; document.getElementById('roll-btn').disabled = true;
            let p = gameState.players[localPlayerId];
            let d1 = Math.floor(Math.random() * 6) + 1; let d2 = Math.floor(Math.random() * 6) + 1; let steps = d1 + d2;
            addLog(`🎲 <b>${p.name}</b> 擲出了 ${d1} + ${d2} = <b>${steps}</b> 點`); movePlayerCloud(p, steps);
        }

        function useSalesCard(idx) {
            if(!isMyTurn) return;
            let p = gameState.players[localPlayerId]; let card = p.salesHand[idx];
            addLog(`💼 <b>${p.name}</b> 派出業務員，指定前進 <b>${card.steps}</b> 步！`);
            p.salesHand.splice(idx, 1); movePlayerCloud(p, card.steps);
        }

        function usePayMoveSkill(card) {
            if(!isMyTurn) return;
            let p = gameState.players[localPlayerId];
            if(p.cash < card.cost) { alert("現金不足！"); return; }
            p.cash -= card.cost; addLog(`📺 <b>${p.name}</b> 發動營運計畫【${card.title}】，前進 <b>${card.steps}</b> 步！`); movePlayerCloud(p, card.steps);
        }

        function movePlayerCloud(player, steps) {
            let currentPos = player.position;
            for (let i = 1; i <= steps; i++) {
                currentPos = (currentPos + 1) % 24;
                let isOwnHQ = (player.id === 0 && currentPos === 0) || (player.id === 1 && currentPos === 18);
                if (cellConfigs[currentPos].type === "HQ" && isOwnHQ) {
                    player.cash += 3000;
                    let card = planCardsPool[Math.floor(Math.random() * planCardsPool.length)];
                    if(!player.plans) player.plans = [];
                    player.plans.push(card);
                    addLog(`📜 <b>${player.name}</b> 經過/停留總部！領取 $3000 並獲得計畫：<span style="color:#0D47A1;">${card.title}</span>`);
                }
            }
            player.position = currentPos; uploadState();
            setTimeout(() => { handleCellLandingCloud(player, currentPos); }, 600);
        }

        function handleCellLandingCloud(player, cellId) {
            let config = cellConfigs[cellId]; let state = gameState.boardState[cellId];
            if (config.type === "HQ") {
                let isOpponentHQ = (player.id === 0 && cellId === 18) || (player.id === 1 && cellId === 0);
                if (isOpponentHQ && player.plans && player.plans.some(c => c.type === "hq_double")) {
                    player.cash += 2000; addLog(`🕵️ 停留對手總部！發動營運計畫，收取 $2000 封口費並<b>再玩一回合</b>！`); uploadState(); return;
                }
                addLog(`🏁 抵達 ${config.name}。`); endTurnCloud(); return;
            }
            if (!state || state.owner === null || state.owner === undefined) {
                showDecisionModalCloud(player, config, cellId);
            } else {
                if(state.owner !== player.id) {
                    if(player.plans && player.plans.some(c => c.type === "block_rent") && player.cash >= 2000) {
                        if(confirm(`是否啟動計畫防禦？支付$2000不翻顧客卡。`)) {
                            player.cash -= 2000; addLog(`🛡️ <b>${player.name}</b> 帶風向成功，完美避險不翻卡！`); endTurnCloud(); return;
                        }
                    }
                    if(state.level === 1 && player.plans && player.plans.some(c => c.type === "buyout") && player.cash >= 3500) {
                        if(confirm(`是否強行收購此店鋪？花費 $3500。`)) {
                            player.cash -= 3500; let oldOwner = gameState.players[state.owner]; oldOwner.shops--; player.shops++;
                            gameState.boardState[cellId].owner = player.id; addLog(`💥 <b>股東換我當！</b> ${player.name} 強制接管該店鋪！`);
                            checkAndMergeMallsCloud(player, cellId); endTurnCloud(); return;
                        }
                    }
                }
                triggerCustomerCardCloud(player, config, cellId);
            }
        }

        function showDecisionModalCloud(player, config, cellId) {
            const modal = document.getElementById('decision-modal'); const overlay = document.getElementById('overlay');
            document.getElementById('modal-title').innerText = `${config.name}`;
            document.getElementById('modal-desc').innerText = `建設店鋪需要資金 $${config.price}元。\n若不建設，將自動為你【抽取一張業務員手牌】。`;
            modal.style.display = 'block'; overlay.style.display = 'block';

            document.getElementById('modal-yes-btn').onclick = () => {
                if (player.cash >= config.price) {
                    player.cash -= config.price; gameState.boardState[cellId] = { owner: player.id, level: 1 }; player.shops++;
                    addLog(`🏗️ <b>${player.name}</b> 支付 $${config.price} 建立了新店鋪！`);
                    let hasFreeDraw = player.plans && player.plans.some(c => c.type === "free_draw");
                    checkAndMergeMallsCloud(player, cellId); closeModal();
                    if(hasFreeDraw) {
                        addLog(`🎉 觸發【新店開幕優惠】！立刻原地翻開一張顧客卡消費。`); triggerCustomerCardCloud(player, config, cellId);
                    } else { endTurnCloud(); }
                } else { alert("資金不足，自動轉為抽取業務員卡！"); closeModal(); drawSalesmanCardCloud(player); }
            };
            document.getElementById('modal-no-btn').onclick = () => { closeModal(); drawSalesmanCardCloud(player); };
        }

        function closeModal() { document.getElementById('decision-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

        function drawSalesmanCardCloud(player) {
            let card = salesmanCards[Math.floor(Math.random() * salesmanCards.length)];
            if(card.keep) {
                if(!player.salesHand) player.salesHand = [];
                player.salesHand.push(card); addLog(`💼 <b>${player.name}</b> 獲得了業務員卡：【${card.title}】`);
            } else {
                player.cash += 1000; addLog(`💼 <b>${player.name}</b> 抽到非保留卡【${card.title}】，直接獲得 $1000 元！`);
            }
            if(player.plans && player.plans.some(c => c.type === "draw_bonus")) {
                player.cash += 800; addLog(`└ 💰 觸發【業務員績效獎金】，額外獲得 $800 元！`);
            }
            endTurnCloud();
        }

        function checkAndMergeMallsCloud(player, currentCellId) {
            let currentConfig = cellConfigs[currentCellId];
            let prevId = (currentCellId - 1 + 24) % 24; let nextId = (currentCellId + 1) % 24;
            let combine = (targetId) => {
                let targetConfig = cellConfigs[targetId]; let targetState = gameState.boardState[targetId];
                if (targetState && targetState.owner === player.id && targetState.level === 1 && targetConfig.color === currentConfig.color) {
                    gameState.boardState[currentCellId].level = 2; gameState.boardState[targetId].level = 2;
                    player.shops -= 2; player.malls += 1; addLog(`✨🎉 <b>相鄰同色連線！店鋪升級合併為【百貨商場】！</b>`); return true;
                }
                return false;
            };
            if (!combine(prevId)) combine(nextId);
        }

        function triggerCustomerCardCloud(landingPlayer, config, cellId) {
            let landState = gameState.boardState[cellId]; let ownerPlayer = gameState.players[landState.owner];
            let card = customerCards[Math.floor(Math.random() * customerCards.length)];
            addLog(`👥 翻開顧客卡 <b>[NO.${card.id}]</b>，想買 [ ${card.wish.join(' ')} ]`);
            let matchedIndex = card.wish.indexOf(config.type);

            if (matchedIndex !== -1) {
                let payout = card.pay[matchedIndex];
                if (landState.level === 2) { payout = payout * 2; addLog(`🏪 這是商場！顧客消費金額直接翻倍！`); }
                if(ownerPlayer.plans && ownerPlayer.plans.some(c => c.type === "bonus_own")) {
                    payout += 1500; addLog(`📈 <b>${ownerPlayer.name}</b> 觸發聯名大熱賣，加成 <b>+$1500</b> 元！`);
                }
                if(landingPlayer.id !== ownerPlayer.id && landingPlayer.plans && landingPlayer.plans.some(c => c.type === "intercept")) {
                    let interceptAmt = Math.min(payout, 1000); payout -= interceptAmt; landingPlayer.cash += interceptAmt;
                    addLog(`🕵️ <b>中途攔截！</b> ${landingPlayer.name} 從中拿走分潤 <b>$${interceptAmt}</b> 元！`);
                }
                ownerPlayer.cash += payout; addLog(`💰 結算完成！店主 <b>${ownerPlayer.name}</b> 獲得營收 <b>$${payout}</b> 元！`);
            } else { addLog(`💨 商品不符，顧客轉頭離開。`); }
            endTurnCloud();
        }

        function endTurnCloud() {
            for (let p of gameState.players) {
                if (p.cash >= gameState.winGoal) {
                    addLog(`🏆🎉🏆 <b>${p.name}</b> 賺飽飽率先達到目標！贏得超級百貨王！`); uploadState();
                    setTimeout(() => { roomRef.remove(); location.reload(); }, 5000); return;
                }
            }
            gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % 2; uploadState();
        }
    </script>
</body>
</html>
